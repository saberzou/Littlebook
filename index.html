<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Littlebook — Daily Book, Wallpaper & Quote</title>
    <meta name="description" content="A curated daily book recommendation with a beautiful wallpaper and an inspiring quote.">
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Geist:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">

        <!-- Horizontal swipeable calendar strip -->
        <div class="calendar-strip" id="calendarStrip">
            <div class="calendar-track" id="calendarTrack"></div>
        </div>

        <!-- Main content area -->
        <div class="content-area" id="contentArea">

            <!-- Desktop book carousel -->
            <div class="book-carousel" id="bookCarousel">
                <div class="carousel-track" id="carouselTrack"></div>
            </div>

            <!-- Book spread (cover + unfold pages) -->
            <div class="book-spread" id="bookSpread">
                <div class="book-3d">
                    <!-- Inner pages (visible when open) -->
                    <div class="book-pages" id="bookPages">
                        <div class="book-page-left">
                            <h1 class="book-title" id="bookTitle">Title</h1>
                            <p class="book-author" id="bookAuthor">Author</p>
                        </div>
                        <div class="book-page-right">
                            <div class="quote-decoration">
                                <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                                    <path d="M4.583 17.321C3.553 16.227 3 15 3 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 0 1-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179zm10 0C13.553 16.227 13 15 13 13.011c0-3.5 2.457-6.637 6.03-8.188l.893 1.378c-3.335 1.804-3.987 4.145-4.247 5.621.537-.278 1.24-.375 1.929-.311 1.804.167 3.226 1.648 3.226 3.489a3.5 3.5 0 0 1-3.5 3.5c-1.073 0-2.099-.49-2.748-1.179z"/>
                                </svg>
                            </div>
                            <p class="quote-text" id="quoteText">Quote</p>
                            <p class="quote-source" id="quoteSource">— Source</p>
                        </div>
                    </div>
                    <!-- The cover (flips open) -->
                    <div class="book-cover" id="bookCover3d">
                        <img id="bookCover" src="" alt="Book cover">
                    </div>
                </div>
            </div>

            <!-- Book meta below spread (visible when closed) -->
            <div class="book-meta-below" id="bookMetaBelow">
                <span class="tag" id="bookCategoryBelow">Category</span>
                <h1 class="book-title" id="bookTitleBelow">Title</h1>
                <p class="book-author" id="bookAuthorBelow">Author</p>
                <p class="book-desc" id="bookDescBelow">Description</p>
            </div>

            <!-- Audio player pill -->
            <div class="audio-player" id="audioPlayer" style="display:none">
                <button class="audio-btn" id="audioBtn" aria-label="Play podcast">
                    <svg class="audio-icon play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    <svg class="audio-icon pause" viewBox="0 0 24 24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    <div class="audio-progress" id="audioProgress"></div>
                    <span class="audio-time" id="audioTime">0:00</span>
                </button>
                <audio id="audioEl" preload="metadata"></audio>
            </div>

            <!-- Hourglass overlay (shown when tomorrow is selected) -->
            <div class="hourglass-overlay" id="hourglassOverlay">
                <div class="hourglass-container">
                    <canvas id="gravityClockCanvas"></canvas>
                    <div class="hourglass-label">Tomorrow's pick arrives in</div>
                    <div class="hourglass-countdown" id="hourglassCountdown">--:--:--</div>
                    <div class="hourglass-hint">Come back tomorrow for a new book, wallpaper & quote</div>
                </div>
            </div>

        </div>

    </div>

    <script src="data.js?v=6"></script>
    <script src="clock.js?v=6"></script>
    <script src="app.js?v=6"></script>
</body>
</html>
